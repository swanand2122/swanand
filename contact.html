<style>
.contact-boxes {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 40px;
}
.contact-box {
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 30px 50px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    min-width: 250px;
    text-align: center;
    border: 1.5px solid #00d4ff;
    transition: transform 0.2s;
}
.contact-box:hover {
    transform: translateY(-7px) scale(1.04);
    box-shadow: 0 14px 40px rgba(0,0,0,0.23);
}
.contact-icon {
    font-size: 2.3rem;
    margin-bottom: 12px;
    display: block;
    color: #00d4ff;
}
.contact-info {
    font-size: 1.1rem;
    margin-top: 8px;
    word-break: break-all;
}
.contact-info a {
    color: inherit;
    text-decoration: underline;
    cursor: pointer;
}
.contact-icon svg {
    vertical-align: middle;
}
@media (max-width:600px) {
    .contact-boxes {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    .contact-box {
        min-width: 180px;
        padding: 18px 20px;
    }
}
</style>
